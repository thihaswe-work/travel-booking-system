version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-booking-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travel_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travel-booking-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: travel-booking-api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/travel_booking?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "super-secret-jwt-key-change-in-production"
      JWT_REFRESH_SECRET: "super-secret-refresh-key-change-in-production"
      JWT_EXPIRES_IN: "900"
      JWT_REFRESH_EXPIRES_IN: "604800"
      PORT: "4000"
      NODE_ENV: "production"
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
